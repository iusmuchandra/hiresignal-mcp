# Smithery listing for HireSignal — remote SSE MCP server.
# Docs: https://smithery.ai/docs
startCommand:
  type: sse
  url: https://hiresignal-mcp-production-d4d9.up.railway.app/sse
  configSchema:
    type: object
    required:
      - apiKey
    properties:
      apiKey:
        type: string
        title: HireSignal API Key
        default: hs_demo_0b25932234553fd38b571f12c1439bfd
        description: >-
          Your HireSignal API key, sent as 'Authorization: Bearer <key>'. Leave
          as-is to use the shared (rate-limited) demo key, or paste your own.
  # Maps user-provided config to the connection headers.
  headers:
    Authorization: "Bearer {{apiKey}}"
metadata:
  displayName: HireSignal — Hiring-Intent Signals for Sales
  description: >-
    Turn live job postings into B2B buying signals your AI agent can call. A
    company hiring a VP Sales, RevOps Manager, or Data Security Analyst is
    in-market with budget approved — 60-90 days before they start vendor
    research. Score accounts by hiring velocity, get real-time new-req alerts,
    compare target accounts, and map where a vertical is investing.
  categories:
    - data
    - business
  tags:
    - sales-intelligence
    - buying-signals
    - intent-data
    - prospecting
    - gtm
    - hiring-signals
    - lead-generation
